name: Simple APK Build

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleProdDebug --stacktrace

    - name: Create Release and Upload APK
      run: |
        TAG="v1.0.${{ github.run_number }}"
        APK_PATH=$(find app/build/outputs/apk/prod/debug -name "*.apk" | head -n 1)
        gh release create "$TAG" "$APK_PATH" --title "Farm Directory Pro $TAG" --notes "Automated build for installation on device."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


