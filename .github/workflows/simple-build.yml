name: Simple APK Build

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleProdDebug --stacktrace

    - name: Upload to transfer.sh
      run: |
        APK_PATH=$(find app/build/outputs/apk/prod/debug -name "*.apk" | head -n 1)
        if [ -f "$APK_PATH" ]; then
          curl --upload-file "$APK_PATH" https://transfer.sh/farm-directory-pro-debug.apk > transfer_url.txt
          echo "APK URL: $(cat transfer_url.txt)"
        else
          echo "APK not found"
        fi

